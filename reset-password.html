<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SmartLog</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body {
            background-color: #191816; /* AppBgDark */
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 24px;
        }
        .card {
            background-color: #363128; /* FormContainerBg */
            width: 100%;
            max-width: 400px;
            padding: 40px 32px;
            border-radius: 28px;
            box-shadow: 5px 7px 10px rgba(0, 0, 0, 0.6), -4px -5px 8px rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        .icon {
            width: 72px;
            height: 72px;
            background-color: #423C32;
            border-radius: 50%;
            margin: 0 auto 24px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            box-shadow: 4px 8px 12px rgba(0,0,0,0.6);
        }
        h1 { font-size: 22px; font-weight: bold; margin-bottom: 8px; }
        p { color: #AFA69D; font-size: 14px; margin-bottom: 32px; }
        
        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group input {
            width: 100%;
            padding: 16px;
            background-color: #3E2D23; /* InputFieldBg */
            border: none;
            border-radius: 16px;
            color: #FFFFFF;
            font-size: 16px;
            outline: none;
            box-shadow: inset 1px 1.5px 2.5px rgba(0,0,0,0.7), inset -0.5px -0.5px 1.5px rgba(255,255,255,0.05);
        }
        .input-group input::placeholder { color: #AFA69D; opacity: 0.5; }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(180deg, #FFFF8A3D 0%, #FFD95C0A 100%); /* BrandOrange */
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 6px 10px 12px rgba(0,0,0,0.8);
            transition: transform 0.1s;
        }
        button:active { transform: translateY(2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        #message { margin-top: 20px; font-size: 14px; min-height: 20px; line-height: 1.5; }
        .error { color: #E57373; }
        .success { color: #4CAF50; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon" id="status-icon">🔒</div>
        <h1 id="title">Reset Password</h1>
        <p id="subtitle">Enter your new password below.</p>

        <form id="reset-form">
            <div class="input-group">
                <input type="password" id="password" placeholder="New Password" required minlength="6">
            </div>
            <div class="input-group">
                <input type="password" id="confirm-password" placeholder="Confirm Password" required minlength="6">
            </div>
            <button type="submit" id="submit-btn">UPDATE PASSWORD</button>
        </form>

        <div id="message"></div>
    </div>

    <script>
        // 初始化 Supabase
        const SUPABASE_URL = 'https://bouxgdeqqbludprkrmtx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvdXhnZGVxcWJsdWRwcmtybXR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNTQyMjcsImV4cCI6MjA4OTczMDIyN30.lNTS183IK3X0smiA7t3HS2tIduEycPKG677bHvGf-JQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('reset-form');
        const msgDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submit-btn');
        const icon = document.getElementById('status-icon');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msgDiv.className = "";
            msgDiv.innerText = "";
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // 1. 本地校验密码是否一致
            if (password !== confirmPassword) {
                msgDiv.className = "error";
                msgDiv.innerText = "Passwords do not match!";
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "UPDATING...";

            try {
                // 2. 调用 Supabase 更新密码接口 (SDK 会自动读取 URL 里的 token)
                const { data, error } = await supabase.auth.updateUser({
                    password: password
                });

                if (error) {
                    msgDiv.className = "error";
                    // 如果用户是直接打开网页（没有通过邮件链接），会报 Auth session missing
                    if (error.message.includes("Auth session missing")) {
                        msgDiv.innerText = "Invalid or expired link. Please request a new password reset from the SmartLog app.";
                    } else {
                        msgDiv.innerText = error.message;
                    }
                    submitBtn.disabled = false;
                    submitBtn.innerText = "UPDATE PASSWORD";
                } else {
                    // 3. 成功后的处理：隐藏表单，展示成功提示
                    form.style.display = "none";
                    icon.innerText = "✅";
                    icon.style.backgroundColor = "rgba(76, 175, 80, 0.2)";
                    title.innerText = "Success!";
                    subtitle.innerText = "";
                    msgDiv.className = "success";
                    msgDiv.innerHTML = "Your password has been updated securely.<br><br><b>You can now close this page and log into the SmartLog app.</b>";
                }
            } catch (err) {
                msgDiv.className = "error";
                msgDiv.innerText = "A network error occurred. Please try again.";
                submitBtn.disabled = false;
                submitBtn.innerText = "UPDATE PASSWORD";
            }
        });
    </script>
</body>
</html>
